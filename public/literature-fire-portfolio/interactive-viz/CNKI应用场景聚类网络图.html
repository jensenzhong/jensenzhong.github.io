.lg-note{color:#3d444d;font-size:10px;margin-top:6px;border-top:1px solid #1d2330;padding-top:5px}

<body>
<div id="header">

    <div class="stat">场景 <b id="sc">0</b> 类</div>

</div>
<div id="filters">

</div>
<div id="main"><svg id="g"></svg></div>
<div id="sidebar">
  <div id="side-head">文献详情</div>

</div>
<div id="legend">

</div>
<div id="controls">

  <button class="btn" onclick="toggleLabels()">显示/隐藏标签</button>
  <button class="btn" onclick="reSim()">重新布局</button>

</div>

const COLORS=DATA.colors;
const SCENES=DATA.scenes;
const nodes=DATA.nodes.map(d=>({...d}));
const rawLinks=DATA.links.map(d=>({...d}));

document.getElementById('sp').textContent=DATA.summary.papers;
document.getElementById('sl').textContent=DATA.summary.links;
document.getElementById('sc').textContent=DATA.summary.sceneCount;

const legendBody=document.getElementById('legend-body');
legendBody.innerHTML=DATA.summary.sceneTotals.map((d,i)=>`<div class="lg-row" data-scene="${d.name}"><div class="lg-dot" style="background:${d.color}"></div>${d.name} <span style="color:#6e7681">(${d.count})</span></div>`).join('');
document.querySelectorAll('.lg-row').forEach(el=>el.onclick=()=>setScene(el.dataset.scene));
document.getElementById('filters').insertAdjacentHTML('beforeend', DATA.summary.sceneTotals.map(d=>`<button class="tag-btn" data-scene="${d.name}">${d.name}</button>`).join(''));

let activeScene='all';
let currentQuery='';
let lblOn=false;

const svg=d3.select('#g');
const W=()=>document.getElementById('main').clientWidth;
const H=()=>document.getElementById('main').clientHeight;
const g=svg.append('g');
const linkG=g.append('g').attr('class','links');
const nodeG=g.append('g').attr('class','nodes');

const zoom=d3.zoom().scaleExtent([0.05,8]).on('zoom',e=>g.attr('transform',e.transform));
svg.call(zoom);

const clusterPos={};
function calcClusterPos(){
  for(let i=0;i<SCENES.length;i++){
    const angle=(i/SCENES.length)*2*Math.PI - Math.PI/2;
    clusterPos[i]={x:W()/2+Math.cos(angle)*Math.min(380,W()*0.27), y:H()/2+Math.sin(angle)*Math.min(290,H()*0.24)};
  }
}
calcClusterPos();

nodes.forEach(n=>{
  const cp=clusterPos[n.cluster];
  n.x=cp.x+(Math.random()-0.5)*120;
  n.y=cp.y+(Math.random()-0.5)*120;
});

const deg={};
nodes.forEach(n=>deg[n.id]=n.degree||0);
function R(d){return 4+Math.sqrt((deg[d.id]||0))*2.7;}

let currentLinks=rawLinks.slice();

function clusterForce(str){
  return ()=>{
    nodes.forEach(n=>{
      if(n.hidden) return;
      const cp=clusterPos[n.cluster];
      n.vx+=(cp.x-n.x)*str;
      n.vy+=(cp.y-n.y)*str;
    });
  };
}

const sim=d3.forceSimulation(nodes)
  .force('link',d3.forceLink(rawLinks).id(d=>d.id)
    .distance(d=>d.strength>=4?55:d.strength>=3?78:d.strength>=2?110:150)
    .strength(d=>d.strength>=3?0.35:d.sameScene?0.18:0.08))
  .force('charge',d3.forceManyBody().strength(-540).distanceMax(650))
  .force('collision',d3.forceCollide().radius(d=>R(d)+16).strength(1))
  .force('cluster',clusterForce(0.06))
  .force('center',d3.forceCenter(W()/2,H()/2).strength(0.015))
  .alphaDecay(0.015);

const linkSel=linkG.selectAll('line').data(rawLinks).join('line')
  .attr('stroke',d=>{
    const sid=typeof d.source==='object'?d.source.id:d.source;
    const n=nodes.find(x=>x.id===sid);
    return d.sameScene && n ? COLORS[n.cluster] : '#6e7681';
  })
  .attr('stroke-width',d=>Math.min(5.2,0.5+d.strength*0.8))
  .attr('stroke-opacity',0.34);

const nodeSel=nodeG.selectAll('g').data(nodes).join('g')
  .style('cursor','pointer')
  .call(d3.drag()
    .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y;})
    .on('drag',(e,d)=>{d.fx=e.x; d.fy=e.y;})
    .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0); d.fx=null; d.fy=null;}))
  .on('mouseover',onHover)
  .on('mouseout',offHover)
  .on('click',(e,d)=>{e.stopPropagation(); selectNode(d);});

nodeSel.append('circle')
  .attr('r',R)
  .attr('fill',d=>COLORS[d.cluster])
  .attr('fill-opacity',0.86)
  .attr('stroke',d=>COLORS[d.cluster])
  .attr('stroke-width',1.6)
  .attr('stroke-opacity',0.52);

const lblSel=nodeSel.append('text')
  .attr('dx',d=>R(d)+3)
  .attr('dy','0.35em')
  .text(d=>d.short)
  .attr('font-size','9px')
  .attr('fill','#adb5bd')
  .attr('pointer-events','none')
  .style('display','none');

svg.on('click',()=>clearSel());

sim.on('tick',()=>{
  linkSel
    .attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
    .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeSel.attr('transform',d=>`translate(${d.x},${d.y})`);
});

document.querySelectorAll('.tag-btn').forEach(btn=>btn.onclick=()=>setScene(btn.dataset.scene));
document.getElementById('search').addEventListener('input',e=>{currentQuery=e.target.value.trim().toLowerCase(); applyFilters();});

function setScene(scene){
  activeScene=scene;
  document.querySelectorAll('.tag-btn').forEach(b=>b.classList.toggle('active', b.dataset.scene===scene));
  document.querySelectorAll('.lg-row').forEach(r=>r.classList.toggle('off', scene!=='all' && r.dataset.scene!==scene));
  applyFilters();
}

function matchesQuery(n){
  if(!currentQuery) return true;
  return [n.title,n.authors,n.scene,...(n.kw||[])].join(' ').toLowerCase().includes(currentQuery);
}

function applyFilters(){
  const visibleIds=new Set();
  nodes.forEach(n=>{
    n.hidden=!(activeScene==='all'||n.scene===activeScene) || !matchesQuery(n);
    if(!n.hidden) visibleIds.add(n.id);
  });
  currentLinks=rawLinks.filter(l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return visibleIds.has(s)&&visibleIds.has(t);
  });
  nodeSel.style('display',d=>d.hidden?'none':null);
  linkSel.style('display',d=>currentLinks.includes(d)?null:'none');
  lblSel.style('display',d=>lblOn&&!d.hidden?null:'none');
  clearSel(false);
  sim.alpha(0.7).restart();
}

function resetView(){
  svg.transition().duration(700).call(zoom.transform,
    d3.zoomIdentity.translate(W()/2,H()/2).scale(0.9).translate(-W()/2,-H()/2));
}

function reSim(){
  calcClusterPos();
  nodes.forEach(n=>{
    const cp=clusterPos[n.cluster];
    n.x=cp.x+(Math.random()-0.5)*90;
    n.y=cp.y+(Math.random()-0.5)*90;
    n.vx=0; n.vy=0;
  });
  sim.alpha(1).restart();
}

function toggleLabels(){
  lblOn=!lblOn;
  lblSel.style('display',d=>lblOn&&!d.hidden?null:'none');
}

const tip=document.getElementById('tooltip');
function onHover(e,d){
  tip.style.display='block';
  tip.innerHTML=`<b style="color:${COLORS[d.cluster]}">${d.short}</b><br>${d.title.length>46?d.title.slice(0,46)+'…':d.title}<br><span style="color:#6e7681">${d.year} · ${d.scene}</span>`;
  d3.select(this).select('circle').attr('stroke-opacity',1).attr('stroke-width',3);
}
function offHover(e,d){
  tip.style.display='none';
  d3.select(this).select('circle').attr('stroke-opacity',0.52).attr('stroke-width',1.6);
}
document.addEventListener('mousemove',e=>{
  tip.style.left=(e.clientX+15)+'px';
  tip.style.top=(e.clientY-8)+'px';
});

function clearSel(resetDetail=true){
  nodeSel.each(function(n){
    const shown=!n.hidden;
    d3.select(this).select('circle')
      .attr('fill-opacity',shown?0.86:0.08)
      .attr('stroke-opacity',shown?0.52:0.04)
      .attr('filter',null);
  });
  linkSel.attr('stroke-opacity',d=>currentLinks.includes(d)?0.34:0.02);
  if(resetDetail){
    document.getElementById('detail').innerHTML='<div class="placeholder">点击节点<br>查看文献信息</div>';
  }
}

function selectNode(d){
  const neighborIds=new Set([d.id]);
  const relatedLinks=[];
  currentLinks.forEach(l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    if(s===d.id||t===d.id){
      neighborIds.add(s===d.id?t:s);
      relatedLinks.push(l);
    }
  });
  nodeSel.each(function(n){
    const inN=neighborIds.has(n.id);
    d3.select(this).select('circle')
      .attr('fill-opacity',n.hidden?0.04:(inN?0.94:0.12))
      .attr('stroke-opacity',n.hidden?0.02:(inN?0.9:0.08))
      .attr('filter',n.id===d.id?`drop-shadow(0 0 9px ${COLORS[d.cluster]})`:null);
  });
  linkSel.attr('stroke-opacity',l=>relatedLinks.includes(l)?0.74:(currentLinks.includes(l)?0.04:0.01));
  showDetail(d, relatedLinks);
}

function showDetail(d, relatedLinks){
  const color=COLORS[d.cluster];
  const related=relatedLinks.map(l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    const id=s===d.id?t:s;
    const n=nodes.find(x=>x.id===id);
    return {...n, shared:l.shared, strength:l.strength, sameScene:l.sameScene};
  }).filter(Boolean).sort((a,b)=>b.strength-a.strength||b.year-a.year);

  let h=`<div style="--c:${color}">
    <div class="d-title">${d.title}</div>
    <div class="d-row">作者：<span>${d.authors||'未提供'}</span></div>
    <div class="d-row">年份：<span>${d.year}</span></div>
    <div class="d-row">期刊：<span>${d.journal||'未提供'}</span></div>
    <div class="d-row">场景：<span style="color:${color}">${d.scene}</span></div>
    <div class="d-row">关键词：<div style="margin-top:3px">${(d.kw||[]).map(k=>`<span class="kw">${k}</span>`).join('')}</div></div>
    <div class="d-row" style="margin-top:6px;padding-top:6px;border-top:1px solid #1d2330">关联文献 <b style="color:${color}">${related.length}</b> 篇</div>`;
  h+=related.map(n=>`<div class="rel-item" onclick="focusNode(${n.id})"><div class="rel-title">${n.short} · ${n.title.length>30?n.title.slice(0,30)+'…':n.title}</div><div class="rel-shared">${n.sameScene?'同场景':''}${n.sameScene&&n.shared.length?' · ':''}${n.shared.length?'共享关键词：'+n.shared.join('、'):'弱关键词重叠'}</div></div>`).join('');
  h+='</div>';
  document.getElementById('detail').innerHTML=h;
}

function focusNode(id){
  const n=nodes.find(x=>x.id===id);
  if(n) selectNode(n);
}

window.focusNode=focusNode;
window.resetView=resetView;
window.toggleLabels=toggleLabels;
window.reSim=reSim;
window.clearSel=clearSel;

window.addEventListener('resize',()=>{
  calcClusterPos();
  sim.force('center', d3.forceCenter(W()/2,H()/2).strength(0.015));
  sim.alpha(0.7).restart();
});

applyFilters();
</script>
</body>
</html>
