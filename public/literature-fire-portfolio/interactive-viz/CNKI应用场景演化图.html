</div>

32, "strength": 2, "shared": [], "sameScene": true, "sameTech": true}, {"source": 32, "target": 13, "strength": 2, "shared": [], "sameScene": true, "sameTech": true}, {"source": 32, "target": 15, "strength": 2, "shared": [], "sameScene": true, "sameTech": true}, {"source": 32, "target": 9, "strength": 2, "shared": [], "sameScene": true, "sameTech": true}, {"source": 32, "target": 3, "strength": 2, "shared": [], "sameScene": true, "sameTech": true}, {"source": 13, "target": 9, "strength": 2, "shared": [], "sameScene": true, "sameTech": true}, {"source": 13, "target": 3, "strength": 2, "shared": [], "sameScene": true, "sameTech": true}, {"source": 15, "target": 9, "strength": 2, "shared": [], "sameScene": true, "sameTech": true}, {"source": 15, "target": 3, "strength": 2, "shared": [], "sameScene": true, "sameTech": true}, {"source": 9, "target": 3, "strength": 2, "shared": [], "sameScene": true, "sameTech": true}, {"source": 34, "target": 26, "strength": 1, "shared": [], "sameScene": true, "sameTech": false}, {"source": 26, "target": 1, "strength": 1, "shared": [], "sameScene": true, "sameTech": false}, {"source": 1, "target": 0, "strength": 1, "shared": [], "sameScene": true, "sameTech": false}], "lanes": [{"id": 0, "name": "疏散与路径规划", "count": 24, "color": "#8ecf6c"}, {"id": 1, "name": "灭火救援与机器人装备", "count": 11, "color": "#ff9f43"}, {"id": 2, "name": "消防管理与平台建设", "count": 10, "color": "#77d970"}, {"id": 3, "name": "风险评估与态势研判", "count": 7, "color": "#4fd1c5"}, {"id": 4, "name": "审查验收与合规设计", "count": 6, "color": "#5ea1ff"}, {"id": 5, "name": "监测预警与火灾识别", "count": 4, "color": "#ff6b57"}], "summary": {"papers": 62, "links": 279, "lanes": 6}};
const svg=document.getElementById('chart');
const tooltip=document.getElementById('tooltip');
const detail=document.getElementById('detail');
const searchInput=document.getElementById('search');
document.getElementById('sp').textContent=DATA.summary.papers;
document.getElementById('sl').textContent=DATA.summary.links;
document.getElementById('sc').textContent=DATA.summary.lanes;

const state={scene:'all',query:'',showLabels:true,selected:null,panX:0,panY:0,scale:1};
const NS='http://www.w3.org/2000/svg';
const margin={top:136,right:210,bottom:54,left:88};
const laneGap=102;
const years=DATA.years;
const lanes=DATA.lanes;
const minYear=Math.min(...years), maxYear=Math.max(...years);

function create(tag, attrs={}) {
  const el=document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

function setupSceneButtons(){
  document.getElementById('filters').insertAdjacentHTML('beforeend',
    lanes.map(l=>`<button class="chip" data-scene="${l.name}">${l.name}</button>`).join('')
  );
  document.querySelectorAll('.chip').forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.scene=btn.dataset.scene;
      document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('active', x===btn));
      applyFilters();
    });
  });
}
setupSceneButtons();
searchInput.addEventListener('input',e=>{state.query=e.target.value.trim().toLowerCase(); applyFilters();});

const root=create('g');
const backdrop=create('g');
const linksLayer=create('g');
const nodesLayer=create('g');
const labelsLayer=create('g');
const overlay=create('g');
root.appendChild(backdrop);
root.appendChild(linksLayer);
root.appendChild(nodesLayer);
root.appendChild(labelsLayer);
root.appendChild(overlay);
svg.appendChild(root);

function chartWidth(){return document.getElementById('canvas-wrap').clientWidth;}
function chartHeight(){return document.getElementById('canvas-wrap').clientHeight;}

function xScale(year){
  const w=chartWidth()-margin.left-margin.right;
  if(maxYear===minYear) return margin.left+w/2;
  return margin.left + ((year-minYear)/(maxYear-minYear))*w;
}
function yScale(cluster){return margin.top+cluster*laneGap;}

const nodeById={};
for(const node of DATA.nodes){ nodeById[node.id]=node; }

function nodeY(node, visibleGroup){
  const laneCenter=yScale(node.cluster);
  const peers=visibleGroup.filter(x=>x.year===node.year && x.cluster===node.cluster).sort((a,b)=>a.label.localeCompare(b.label,'zh'));
  const idx=peers.findIndex(x=>x.id===node.id);
  const offset=(idx-(peers.length-1)/2)*16;
  return laneCenter+offset;
}

function nodeRadius(node){return 3+Math.min(10, Math.sqrt(node.degree||0)*1.45);}

let visibleNodes=[], visibleLinks=[], positions={}, nodeEls=new Map(), labelEls=new Map(), linkEls=new Map();

function matchesQuery(node){
  if(!state.query) return true;
  return [node.title,node.authors,node.scene,node.tech,...(node.keywords||[])].join(' ').toLowerCase().includes(state.query);
}

function applyFilters(){
  visibleNodes = DATA.nodes.filter(n => (state.scene==='all'||n.scene===state.scene) && matchesQuery(n));
  const idSet=new Set(visibleNodes.map(n=>n.id));
  visibleLinks = DATA.links.filter(l=>idSet.has(l.source)&&idSet.has(l.target));
  render();
  clearSelection(false);
}

function render(){
  positions={};
  while(backdrop.firstChild) backdrop.removeChild(backdrop.firstChild);
  while(linksLayer.firstChild) linksLayer.removeChild(linksLayer.firstChild);
  while(nodesLayer.firstChild) nodesLayer.removeChild(nodesLayer.firstChild);
  while(labelsLayer.firstChild) labelsLayer.removeChild(labelsLayer.firstChild);
  while(overlay.firstChild) overlay.removeChild(overlay.firstChild);
  nodeEls=new Map(); labelEls=new Map(); linkEls=new Map();

  const w=chartWidth(), h=chartHeight();
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);

  const band=create('rect',{x:xScale(2020)-42,y:0,width:118,height:h,fill:'rgba(210,190,90,.07)'});
  backdrop.appendChild(band);

  const yearTicks=[years[0], ...years.filter(y=>y%2===0 && y!==years[0] && y!==years[years.length-1]), years[years.length-1]];
  [...new Set(yearTicks)].forEach(year=>{
    const tx=xScale(year);
    const label=create('text',{x:tx,y:72,class:'year-label','text-anchor':'middle'});
    label.textContent=year;
    backdrop.appendChild(label);
  });

  lanes.forEach(lane=>{
    const y=yScale(lane.id);
    const line=create('line',{x1:margin.left-6,y1:y,x2:w-margin.right+10,y2:y,stroke:lane.color,'stroke-width':'1',class:'lane-line'});
    backdrop.appendChild(line);

    const tag=create('g',{'class':'lane-tag'});
    const rect=create('rect',{x:w-margin.right+42,y:y-19,width:154,height:38,rx:8,fill:'rgba(255,255,255,.08)',stroke:'rgba(255,180,120,.12)'});
    const text=create('text',{x:w-margin.right+54,y:y+5,fill:lane.color});
    text.textContent=`#${lane.id} ${lane.name}`;
    tag.appendChild(rect); tag.appendChild(text);
    backdrop.appendChild(tag);

  });

  visibleNodes.forEach(node=>{
    positions[node.id]={x:xScale(node.year), y:nodeY(node, visibleNodes)};
  });

  visibleLinks.forEach((link, idx)=>{
    const a=positions[link.source], b=positions[link.target];
    if(!a||!b) return;
    const dx=b.x-a.x;
    const curve=Math.max(24, Math.min(150, dx*0.34));
    const path=create('path',{
      d:`M ${a.x} ${a.y} C ${a.x+curve} ${a.y} ${b.x-curve} ${b.y} ${b.x} ${b.y}`,
      fill:'none',
      stroke:link.sameScene ? lanes[nodeById[link.source].cluster].color : 'rgba(255,130,90,.7)',
      'stroke-width':String(Math.min(3.4,0.6+link.strength*0.55)),
      'stroke-opacity':link.sameTech ? '0.42' : (link.sameScene ? '0.28' : '0.16'),
    });
    linksLayer.appendChild(path);
    linkEls.set(idx, path);
  });

  const labelQuota = {};
  visibleNodes.forEach(node=>{
    const key=`${node.year}-${node.cluster}`;
    labelQuota[key]=(labelQuota[key]||0)+1;
  });

  visibleNodes.forEach(node=>{
    const pos=positions[node.id];
    const group=create('g',{'class':'node'});
    const diamond=create('rect',{
      x:pos.x-nodeRadius(node),
      y:pos.y-nodeRadius(node),
      width:nodeRadius(node)*2,
      height:nodeRadius(node)*2,
      fill:lanes[node.cluster].color,
      stroke:'#ffe1b0',
      'stroke-width':node.degree>4 ? '1.8' : '0.8',
      transform:`rotate(45 ${pos.x} ${pos.y})`,
      'fill-opacity': node.degree>4 ? '0.92' : '0.78',
    });
    group.appendChild(diamond);
    nodesLayer.appendChild(group);
    nodeEls.set(node.id, group);

    group.addEventListener('mouseenter',e=>showTooltip(e,node));
    group.addEventListener('mousemove',e=>showTooltip(e,node));
    group.addEventListener('mouseleave',hideTooltip);
    group.addEventListener('click',e=>{e.stopPropagation(); selectNode(node.id);});

    const sameBucket = visibleNodes.filter(n=>n.year===node.year && n.cluster===node.cluster).sort((a,b)=>(b.degree-a.degree)||a.label.localeCompare(b.label,'zh'));
    const bucketIndex = sameBucket.findIndex(n=>n.id===node.id);
    const showLabel = bucketIndex === 0 || node.degree >= 7 || (sameBucket.length <= 2 && bucketIndex === 1);
    if(showLabel){
      const txt=create('text',{
        x:pos.x,
        y:pos.y-(bucketIndex===0?14:11),
        'text-anchor':'middle',
        class:'node-label',
        fill:lanes[node.cluster].color
      });
      txt.textContent=node.label.length>8 ? node.label.slice(0,8) : node.label;
      txt.style.display=state.showLabels ? 'block' : 'none';
      labelsLayer.appendChild(txt);
      labelEls.set(node.id, txt);
    }
  });
}

function showTooltip(evt,node){
  tooltip.style.display='block';
  tooltip.innerHTML=`<b style="color:${lanes[node.cluster].color}">${esc(node.tech)}</b><br>${esc(node.title)}<br><span style="color:#a79172">${node.year} · ${esc(node.scene)}</span>`;
  tooltip.style.left=(evt.clientX+14)+'px';
  tooltip.style.top=(evt.clientY-8)+'px';
}
function hideTooltip(){tooltip.style.display='none';}

function clearSelection(resetPanel=true){
  state.selected=null;
  visibleLinks.forEach((link, idx)=>{
    const el=linkEls.get(idx);
    if(!el) return;
    el.setAttribute('stroke-opacity', link.sameScene ? '0.32' : '0.24');
  });
  visibleNodes.forEach(node=>{
    const g=nodeEls.get(node.id);
    if(g) g.style.opacity='1';
  });
  if(resetPanel){
    detail.innerHTML='<div class="placeholder">点击节点<br>查看文献信息与演化连接</div>';
  }
}

function selectNode(nodeId){
  state.selected=nodeId;
  const rel=visibleLinks.filter(l=>l.source===nodeId || l.target===nodeId);
  const neighborIds=new Set([nodeId]);
  rel.forEach(l=>neighborIds.add(l.source===nodeId?l.target:l.source));

  visibleLinks.forEach((link, idx)=>{
    const el=linkEls.get(idx);
    if(!el) return;
    el.setAttribute('stroke-opacity', rel.includes(link) ? '0.78' : '0.06');
  });
  visibleNodes.forEach(node=>{
    const g=nodeEls.get(node.id);
    if(g) g.style.opacity = neighborIds.has(node.id) ? '1' : '0.16';
  });
  showDetail(nodeId, rel);
}

function showDetail(nodeId, relLinks){
  const node=nodeById[nodeId];
  const color=lanes[node.cluster].color;
  const related=relLinks.map(link=>{
    const rid=link.source===nodeId?link.target:link.source;
    return {node:nodeById[rid], link};
  }).sort((a,b)=>b.link.strength-a.link.strength || b.node.year-a.node.year);

  let html=`<div style="--c:${color}">
    <div class="d-title">${esc(node.title)}</div>
    <div class="d-row">作者：<span>${esc(node.authors||'未提供')}</span></div>
    <div class="d-row">年份：<span>${node.year}</span></div>
    <div class="d-row">期刊：<span>${esc(node.journal||'未提供')}</span></div>
    <div class="d-row">场景：<span style="color:${color}">${esc(node.scene)}</span></div>
    <div class="d-row">技术：<span>${esc(node.tech)}</span></div>
    <div class="d-row">关键词：<div style="margin-top:3px">${(node.keywords||[]).map(k=>`<span class="kw">${esc(k)}</span>`).join('')}</div></div>
    <div class="d-row" style="margin-top:7px;padding-top:7px;border-top:1px solid rgba(255,180,120,.08)">相关演化节点 <span style="color:${color}">${related.length}</span> 个</div>`;
  html+=related.map(item=>`<div class="rel" onclick="focusNode(${item.node.id})"><div class="rel-title">${esc(item.node.short)} · ${esc(item.node.title.length>28?item.node.title.slice(0,28)+'…':item.node.title)}</div><div class="rel-meta">${item.link.sameScene?'同场景':''}${item.link.sameScene&&item.link.sameTech?' · ':''}${item.link.sameTech?'同技术：'+esc(item.node.tech):''}${(item.link.sameScene||item.link.sameTech)&&item.link.shared.length?' · ':''}${item.link.shared.length?'共享关键词：'+item.link.shared.join('、'):'场景关联'}</div></div>`).join('');
  html+='</div>';
  detail.innerHTML=html;
}

function focusNode(id){selectNode(id);}
window.focusNode=focusNode;

function toggleLabels(){
  state.showLabels=!state.showLabels;
  labelEls.forEach(el=>el.style.display=state.showLabels?'block':'none');
}
window.toggleLabels=toggleLabels;

function resetView(){
  state.panX=0; state.panY=0; state.scale=1;
  applyTransform();
}
window.resetView=resetView;

window.clearSelection=clearSelection;

function applyTransform(){
  root.setAttribute('transform',`translate(${state.panX},${state.panY}) scale(${state.scale})`);
}

let dragging=false,startX=0,startY=0;
svg.addEventListener('mousedown',e=>{dragging=true; startX=e.clientX-state.panX; startY=e.clientY-state.panY;});
window.addEventListener('mousemove',e=>{ if(!dragging) return; state.panX=e.clientX-startX; state.panY=e.clientY-startY; applyTransform(); });
window.addEventListener('mouseup',()=>{dragging=false;});
svg.addEventListener('wheel',e=>{
  e.preventDefault();
  const factor=e.deltaY<0?1.08:0.92;
  state.scale=Math.max(0.6,Math.min(2.4,state.scale*factor));
  applyTransform();
},{passive:false});

window.addEventListener('resize',()=>render());
svg.addEventListener('click',()=>clearSelection());

applyFilters();
</script>

</html>
