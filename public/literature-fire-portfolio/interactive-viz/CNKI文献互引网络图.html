arget":61,"strength":1,"shared":["消防机器人"]},{"source":57,"target":58,"strength":1,"shared":["物联网"]},{"source":59,"target":60,"strength":2,"shared":["高层建筑","消防机器人"]},{"source":59,"target":61,"strength":1,"shared":["消防机器人"]},{"source":60,"target":61,"strength":1,"shared":["消防机器人"]}];

const links=RL.filter(d=>d.strength>=1);
document.getElementById('sl').textContent=links.length;
const nodes=RN.map(d=>({...d}));

// degree
const deg={};
nodes.forEach(n=>deg[n.id]=0);
links.forEach(l=>{deg[l.source]++;deg[l.target]++;});
function R(d){return 4+Math.sqrt((deg[d.id]||0))*2.8;}

const svg=d3.select('#g');
const W=()=>document.getElementById('main').clientWidth;
const H=()=>document.getElementById('main').clientHeight;
const g=svg.append('g');

const zoom=d3.zoom().scaleExtent([0.05,8]).on('zoom',e=>g.attr('transform',e.transform));
svg.call(zoom);

// cluster positions - 7 clusters arranged in a circle
const clusterPos={};
for(let i=0;i<7;i++){
  const angle=(i/7)*2*Math.PI - Math.PI/2;
  clusterPos[i]={x:W()/2+Math.cos(angle)*380, y:H()/2+Math.sin(angle)*300};
}

// init node positions near cluster center
nodes.forEach(n=>{
  const cp=clusterPos[n.cluster];
  n.x=cp.x+(Math.random()-0.5)*120;
  n.y=cp.y+(Math.random()-0.5)*120;
});

const sim=d3.forceSimulation(nodes)
  .force('link',d3.forceLink(links).id(d=>d.id)
    .distance(d=>d.strength>=3?70:d.strength>=2?100:140)
    .strength(d=>d.strength>=2?0.3:0.08))
  .force('charge',d3.forceManyBody().strength(-500).distanceMax(600))
  .force('collision',d3.forceCollide().radius(d=>R(d)+18).strength(1))
  .force('cluster',clusterForce(0.06))
  .force('center',d3.forceCenter(W()/2,H()/2).strength(0.01))
  .alphaDecay(0.015);

function clusterForce(str){
  return ()=>{
    nodes.forEach(n=>{
      const cp=clusterPos[n.cluster];
      n.vx+=(cp.x-n.x)*str;
      n.vy+=(cp.y-n.y)*str;
    });
  };
}

// draw links
const linkG=g.append('g').attr('class','links');
const linkSel=linkG.selectAll('line').data(links).join('line')
  .attr('stroke',d=>{
    const n=nodes.find(n=>n.id===(typeof d.source==='object'?d.source.id:d.source));
    return n?C[n.cluster]:'#555';
  })
  .attr('stroke-width',d=>Math.min(5,0.5+d.strength*0.8))
  .attr('stroke-opacity',0.35)
  .attr('fill','none');

// draw nodes
const nodeG=g.append('g').attr('class','nodes');
const nodeSel=nodeG.selectAll('g').data(nodes).join('g')
  .style('cursor','pointer')
  .call(d3.drag()
    .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
    .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}))
  .on('mouseover',onHover).on('mouseout',offHover)
  .on('click',(e,d)=>{e.stopPropagation();selectNode(d);});

nodeSel.append('circle')
  .attr('r',R)
  .attr('fill',d=>C[d.cluster])
  .attr('fill-opacity',0.85)
  .attr('stroke',d=>C[d.cluster])
  .attr('stroke-width',1.5)
  .attr('stroke-opacity',0.5);

const lblSel=nodeSel.append('text')
  .attr('dx',d=>R(d)+3).attr('dy','0.35em')
  .text(d=>d.short)
  .attr('font-size','9px')
  .attr('fill','#adb5bd')
  .attr('pointer-events','none')
  .style('display','none');

svg.on('click',()=>clearSel());

sim.on('tick',()=>{
  linkSel
    .attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
    .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeSel.attr('transform',d=>`translate(${d.x},${d.y})`);
});

function resetView(){
  svg.transition().duration(700).call(zoom.transform,
    d3.zoomIdentity.translate(W()/2,H()/2).scale(0.9).translate(-W()/2,-H()/2));
}
function reSim(){
  nodes.forEach(n=>{
    const cp=clusterPos[n.cluster];
    n.x=cp.x+(Math.random()-0.5)*80;
    n.y=cp.y+(Math.random()-0.5)*80;
    n.vx=0;n.vy=0;
  });
  sim.alpha(1).restart();
}

let lblOn=false;
function toggleLabels(){
  lblOn=!lblOn;
  lblSel.style('display',lblOn?null:'none');
}

const tip=document.getElementById('tooltip');
function onHover(e,d){
  tip.style.display='block';
  tip.innerHTML=`<b style="color:${C[d.cluster]}">${d.short}</b><br>`+
    `${d.title.length>44?d.title.slice(0,44)+'…':d.title}<br>`+
    `<span style="color:#6e7681">${d.year} · ${d.journal}</span>`;
  d3.select(this).select('circle').attr('stroke-opacity',1).attr('stroke-width',3);
}
function offHover(e,d){
  tip.style.display='none';
  d3.select(this).select('circle').attr('stroke-opacity',0.5).attr('stroke-width',1.5);
}
document.addEventListener('mousemove',e=>{
  tip.style.left=(e.clientX+15)+'px';
  tip.style.top=(e.clientY-8)+'px';
});

function clearSel(){
  nodeSel.classed('dim',false);
  linkSel.attr('stroke-opacity',0.35);
  nodeSel.select('circle').attr('filter',null);
  document.getElementById('detail-content').innerHTML='<div class="placeholder">点击节点<br>查看文献信息</div>';
}

function selectNode(d){
  const neighborIds=new Set([d.id]);
  const nLinks=[];
  links.forEach(l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    if(s===d.id||t===d.id){neighborIds.add(s===d.id?t:s);nLinks.push(l);}
  });
  nodeSel.select('circle').attr('filter',null);
  nodeSel.each(function(n){
    const inN=neighborIds.has(n.id);
    d3.select(this).select('circle')
      .attr('fill-opacity',inN?0.9:0.15)
      .attr('stroke-opacity',inN?0.8:0.1)
      .attr('filter',n.id===d.id?`drop-shadow(0 0 8px ${C[d.cluster]})`:null);
  });
  linkSel.attr('stroke-opacity',l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return(s===d.id||t===d.id)?0.7:0.04;
  });
  showDetail(d,neighborIds,nLinks);
}

function showDetail(d,neighborIds,nLinks){
  const color=C[d.cluster];
  const related=[...neighborIds].filter(id=>id!==d.id)
    .map(id=>RN.find(n=>n.id===id)).filter(Boolean)
    .sort((a,b)=>b.year-a.year);
  let h=`<div style="--c:${color}">
    <div class="d-title">${d.title}</div>
    <div class="d-row">作者：<span>${d.authors}</span></div>
    <div class="d-row">年份：<span>${d.year}</span></div>
    <div class="d-row">期刊：<span>${d.journal}</span></div>
    <div class="d-row">主题：<span style="color:${color}">${CN[d.cluster]}</span></div>
    <div class="d-row">关键词：<div style="margin-top:3px">${d.kw.map(k=>`<span class="kw">${k}</span>`).join('')}</div></div>
    <div class="d-row" style="margin-top:6px;padding-top:6px;border-top:1px solid #1d2330">关联文献 <b style="color:${color}">${related.length}</b> 篇</div>
  </div>
  <div style="font-size:10px;color:#6e7681;margin:8px 0 4px">▼ 关联文献（点击可跳转）</div>`;
  related.forEach(n=>{
    const lk=nLinks.find(l=>{
      const s=typeof l.source==='object'?l.source.id:l.source;
      const t=typeof l.target==='object'?l.target.id:l.target;
      return(s===d.id&&t===n.id)||(t===d.id&&s===n.id);
    });
    const sh=lk?lk.shared:[];
    h+=`<div class="rel-item" onclick="selectNodeById(${n.id})">
      <div class="rel-title"><span style="color:${C[n.cluster]}">●</span> ${n.short} — ${n.title.length>32?n.title.slice(0,32)+'…':n.title}</div>
      ${sh.length?`<div class="rel-shared">共享关键词: ${sh.slice(0,3).join('、')}</div>`:''}
    </div>`;
  });
  document.getElementById('detail-content').innerHTML=h;
}

function selectNodeById(id){
  const d=nodes.find(n=>n.id===id);
  if(d){selectNode(d);}
}
</script>
